name: Daily Stock Monitor

on:
  schedule:
    # 平日（月-金）の日本時間 08:50 (UTC 23:50) に実行
    - cron: '50 23 * * 0-4'
  workflow_dispatch: # 手動実行用ボタン

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          pip install yfinance pandas pandas-ta line-bot-sdk
      - name: Run Monitor
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python main.py
